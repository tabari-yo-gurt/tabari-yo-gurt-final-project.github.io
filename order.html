<!DOCTYPE html>
<html>
    <head>
        <title>Order Equipment - Tabari's Sports Market</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="container">

            <nav class="navbar navbar-expand-lg navbar-dark bg-dark mt-3">
                <a class="navbar-brand" href="index.html">Tabari's Sports Market</a>
                <div class="ml-auto d-flex align-items-center">
                    <button class="btn btn-sm btn-gold mr-3" onclick="toggleDarkMode()">Dark Mode</button>
                    <div class="navbar-nav mr-3">
                        <a class="nav-item nav-link text-white" href="index.html">Home</a>
                        <a class="nav-item nav-link text-white" href="order.html">Order</a>
                        <a class="nav-item nav-link text-white" href="about.html">About</a>
                        <a class="nav-item nav-link text-white" href="checkout.html">Checkout</a>
                    </div>
                    <button class="btn btn-sm btn-outline-light" onclick="scrollToCart()">
                        Cart <span id="cartCount" class="badge badge-light">0</span>
                    </button>
                </div>
            </nav>

            <div class="mt-5">
                <h1>Order Form</h1>

                <form class="mt-3">

                    <label>Choose an item:</label>
                    <select id="item" class="form-control">
                        <option value="30">Official Basketball - $30</option>
                        <option value="40">Indoor Ball - $40</option>
                        <option value="20">Training Cones - $20</option>

                        <option value="35">Official Football - $35</option>
                        <option value="45">Receiver Gloves - $45</option>
                        <option value="25">Practice Jersey - $25</option>

                        <option value="28">Official Volleyball - $28</option>
                        <option value="22">Knee Pads - $22</option>
                        <option value="60">Training Net - $60</option>
                    </select>

                    <label class="mt-3">Quantity:</label>
                    <input type="number" id="qty" class="form-control" value="1" min="1">

                    <button type="button" class="btn btn-gold mt-3" onclick="addToCart()">Add to Cart</button>

                </form>

                <div id="cartSection" class="cart-section mt-5">
                    <h3>Shopping Cart</h3>
                    <div id="cartItems" class="mt-3"></div>
                    <div id="cartTotals" class="mt-3 h5"></div>
                </div>
            </div>

            <div class="footer">
                 2026 Tabari's Sports Market  All Rights Reserved
            </div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
