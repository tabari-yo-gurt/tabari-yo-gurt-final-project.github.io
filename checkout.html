<!DOCTYPE html>
<html>
    <head>
        <title>Checkout - Tabari's Sports Market</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="container">

            <nav class="navbar navbar-expand-lg navbar-dark bg-dark mt-3">
                <a class="navbar-brand" href="index.html">Tabari's Sports Market</a>
                <div class="ml-auto d-flex align-items-center">
                    <button class="btn btn-sm btn-gold mr-3" onclick="toggleDarkMode()">Dark Mode</button>
                    <div class="navbar-nav">
                        <a class="nav-item nav-link text-white" href="index.html">Home</a>
                        <a class="nav-item nav-link text-white" href="order.html">Order</a>
                        <a class="nav-item nav-link text-white" href="about.html">About</a>
                        <a class="nav-item nav-link text-white" href="checkout.html">Checkout</a>
                    </div>
                </div>
            </nav>

            <div class="mt-5">

                <h1 class="section-title">Checkout</h1>

                <div class="cart-section">
                    <h3>Your Items</h3>
                    <div id="checkoutItems" class="mt-3"></div>
                    <div id="checkoutTotals" class="mt-3 h5"></div>
                </div>

                <h3 class="section-title">Your Information</h3>

                <form class="mt-3">
                    <label>Name:</label>
                    <input type="text" class="form-control" id="name">

                    <label class="mt-3">Email:</label>
                    <input type="email" class="form-control" id="email">

                    <label class="mt-3">Address:</label>
                    <input type="text" class="form-control" id="address">

                    <label class="mt-3">City:</label>
                    <input type="text" class="form-control" id="city">

                    <label class="mt-3">Zip Code:</label>
                    <input type="text" class="form-control" id="zip">

                    <button type="button" class="btn btn-gold mt-4" onclick="placeOrder()">Place Order</button>
                </form>

                <div id="orderMessage" class="mt-4 h4 text-center"></div>

            </div>

            <div class="footer">
                2026 Tabari's Sports Market - All Rights Reserved
            </div>

        </div>

        <script src="script.js"></script>

    </body>
</html>
